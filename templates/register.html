{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header">

<h3 class="text-center">

Register

</h3>

</div>

<div class="card-body">

<form method="POST">

<input
type="text"
name="fullname"
class="form-control mb-3"
placeholder="Full Name"
required>

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Email"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button
class="btn btn-success w-100">

Register

</button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
