{% extends 'base.html' %}

{% block content %}

<div class="container">

```
<div class="card p-4 shadow">

    <h2 class="mb-4">

        Add New Customer

    </h2>

    <form method="POST">

        <div class="mb-3">

            <label>
                Customer Name
            </label>

            <input
                type="text"
                name="customer_name"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>
                City
            </label>

            <input
                type="text"
                name="city"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>
                Phone
            </label>

            <input
                type="text"
                name="phone"
                class="form-control"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Save Customer

        </button>

        <a
            href="/customers"
            class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>
```

</div>

{% endblock %}
