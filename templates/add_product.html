{% extends 'base.html' %}

{% block content %}

<div class="container">

```
<div class="card p-4 shadow">

    <h2 class="mb-4">

        Add New Product

    </h2>

    <form method="POST">

        <div class="mb-3">

            <label>
                Product Name
            </label>

            <input
                type="text"
                name="name"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>
                Category
            </label>

            <input
                type="text"
                name="category"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>
                Price
            </label>

            <input
                type="number"
                name="price"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>
                Stock Quantity
            </label>

            <input
                type="number"
                name="stock"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>
                Supplier
            </label>

            <input
                type="text"
                name="supplier"
                class="form-control"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-success">

            Save Product

        </button>

        <a
            href="/products"
            class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>
```

</div>

{% endblock %}
