{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-header">

<h3 class="text-center">
Login
</h3>

</div>

<div class="card-body">

<form action="/" method="POST">

<input
type="email"
name="email"
class="form-control mb-3"
placeholder="Email"
required>

<input
type="password"
name="password"
class="form-control mb-3"
placeholder="Password"
required>

<button
class="btn btn-primary w-100">

Login

</button>

</form>

<hr>

<a href="/register"
class="btn btn-success w-100">

Create Account

</a>

</div>

</div>

</div>

</div>

{% endblock %}
